name: "Fedora"
name_slug: "fedora"
description: "A community-driven, upstream-focused Linux distribution sponsored by Red Hat."
version: "43-1.6"

architectures:
  - aarch64: "https://mirror.de.leaseweb.net/fedora/linux/releases/${version:0:2}/Container/${architecture}/images/Fedora-Container-Base-Generic-${version}.${architecture}.oci.tar.xz"
  - x86_64: "https://mirror.de.leaseweb.net/fedora/linux/releases/${version:0:2}/Container/${architecture}/images/Fedora-Container-Base-Generic-${version}.${architecture}.oci.tar.xz"

bootstrap_method: oci_container

chroot_script: |
  dnf upgrade -y
  dnf reinstall -y '*'
  dnf install -y passwd util-linux
  dnf clean all
  chmod 4755 /usr/bin/sudo
