name: "Ubuntu"
name_slug: "ubuntu"
description: "User-friendly distribution based on Debian."
version: "questing"

architectures:
  - arm64
  - armhf
  - amd64

bootstrap_method: "mmdebstrap"
mmdebstrap_variant: "apt"
mmdebstrap_components: "main,universe,multiverse"
mmdebstrap_include_pkgs: "locales,passwd,software-properties-common"

chroot_script: |
  # Use normal GNU coreutils instead of Rust-based.
  # Saves a lot of disk space for basic installation.
  apt update
  apt purge -yq --allow-remove-essential coreutils-from-uutils
  apt purge -yq --allow-remove-essential rust-coreutils
  apt install -yq coreutils-from-gnu
  apt install -yq gnu-coreutils

  # Cleanup
  apt clean
  rm -f /var/lib/apt/lists/* || true
