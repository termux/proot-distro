name: "Debian"
name_slug: "debian"
description: "One of the oldest Linux distributions, famous for its stability and versatility."
version: "trixie"

architectures:
  - arm64
  - armhf
  - i386
  - amd64

bootstrap_method: "mmdebstrap"
mmdebstrap_variant: "minbase"
mmdebstrap_components: "main,contrib"
mmdebstrap_include_pkgs: "ca-certificates,locales"
